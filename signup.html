<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../CSS/signup.css">
</head>

<body>


    <form action="">
        <h1>Signup Form</h1>

        <div>
            <label for="user">Username</label>
            <input type="text" id="user" placeholder="enter name">
            <span id="uerror" class="error"></span>
        </div>

        <div>
            <label for="pass">Password</label>
            <input type="text" id="pass" placeholder="enter password">
            <span id="perror" class="error"></span>
        </div>

        <div>
            <label for="cpass">Confirm Password</label>
            <input type="text" id="cpass" placeholder="enter confirm password">
            <span id="cerror" class="error"></span>
        </div>

        <div>
            <label for="mail">Email-ID</label>
            <input type="text" id="mail" placeholder="enter email id">
            <span id="merror" class="error"></span>
        </div>

        <div>
            <label for="num">Phone Number</label>
            <input type="text" id="num" placeholder="enter phone number">
            <span id="nerror" class="error"></span>
        </div>

        <div>
            <button>Signup</button>
            <button>Cancel</button>
        </div>

        <div>Already have an account? <a href=""></a>Login</div>
    </form>



    <script src="../JAVASCRIPT/signup.js"></script>
</body>

</html>
